{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-12">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="d-flex justify-content-between align-items-center">

    <div>

        <h2>
            👋 Welcome {{ request.user.username }}
        </h2>

        <p class="text-muted mb-0">
            Real-Time Chat Dashboard
        </p>

    </div>

    <a href="{% url 'profile' %}">

        {% if request.user.profile.profile_picture %}

            <img
            src="{{ request.user.profile.profile_picture.url }}"
            class="rounded-circle shadow"
            width="70"
            height="70"
            style="
                object-fit:cover;
                border:3px solid #198754;
            ">

        {% else %}

            <img
            src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=075E54&color=fff"
            class="rounded-circle shadow"
            width="70"
            height="70">

        {% endif %}

    </a>

</div>

                <hr>

                <div class="row g-4 mt-2">

                    <div class="col-md-4">

                        <a href="{% url 'user_list' %}"
                           class="btn btn-success w-100 p-3">

                            💬 Start Chat

                        </a>

                    </div>

                    <div class="col-md-4">

                        <a href="{% url 'notification' %}"
                           class="btn btn-warning w-100 p-3">

                            🔔 Notifications
                            ({{ unread_count }})

                        </a>

                    </div>

                    <div class="col-md-4">

                        <a href="{% url 'group_list' %}"
                           class="btn btn-primary w-100 p-3">

                            👥 My Groups

                        </a>

                    </div>

                    <div class="col-md-4">

                        <a href="{% url 'create_group' %}"
                           class="btn btn-info w-100 p-3">

                            ➕ Create Group

                        </a>

                    </div>

                    <div class="col-md-4">

                        <a href="{% url 'profile' %}"
                           class="btn btn-secondary w-100 p-3">

                            👤 Profile

                        </a>

                    </div>

                    <div class="col-md-4">

                        <a href="{% url 'logout' %}"
                           class="btn btn-danger w-100 p-3">

                            🚪 Logout

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
