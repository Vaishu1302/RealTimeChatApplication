{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h3>Set New Password</h3>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
            type="submit"
            class="btn btn-success">

                Change Password

            </button>

        </form>

    </div>

</div>

{% endblock %}
