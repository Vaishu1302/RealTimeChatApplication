{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h3 class="text-center mb-4">

                        🔑 Forgot Password

                    </h3>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button
                        type="submit"
                        class="btn btn-primary w-100">

                            Send Reset Link

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
