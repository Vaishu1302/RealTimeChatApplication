{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow border-0">

                <div class="card-header bg-success text-white">

                    <h4 class="mb-0">

                        ➕ Add Member

                    </h4>

                </div>

                <div class="card-body">

                    <h5 class="mb-4">

                        Group:
                        {{ group.name }}

                    </h5>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Select User

                            </label>

                            <select
                            name="user"
                            class="form-select"
                            required>

                                <option value="">

                                    Choose User

                                </option>

                                {% for user in users %}

                                <option
                                value="{{ user.id }}">

                                    {{ user.username }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <button
                        type="submit"
                        class="btn btn-success w-100">

                            ➕ Add Member

                        </button>

                    </form>

                    <a
                    href="{% url 'group_chat' group.id %}"
                    class="btn btn-secondary w-100 mt-3">

                        ← Back to Group

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
